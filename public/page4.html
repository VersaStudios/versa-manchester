<!DOCTYPE html>
<html>
  <head>
    <title>Welcome — Versa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
      @font-face { font-family: 'Brother1816'; src: url('brother1816-medium.otf') format('opentype'); }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #1a1a1a; color: white;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        height: 100vh;
        font-family: 'Brother1816', Arial, sans-serif;
        text-align: center; padding: 40px;
      }
      #logoWrap {
        width: 200px; overflow: hidden;
        height: 68px; margin-bottom: 40px;
      }
      #logoWrap img { width: 100%; filter: invert(1); display: block; }
      h1 {
        font-size: 52px; line-height: 1.3;
        letter-spacing: 0.02em;
      }
      button {
        margin-top: 44px; padding: 20px 48px; font-size: 22px;
        border-radius: 14px; cursor: pointer; border: 2px solid white;
        background: transparent; color: white;
        font-family: inherit; letter-spacing: 0.04em;
        transition: background 0.2s, color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { background: white; color: #1a1a1a; }
    </style>
  </head>
  <body>
    <div id="logoWrap"><img src="Versa Logo.png" alt="Versa"></div>
    <h1 id="message"></h1>
    <button onclick="goHome()">Close</button>
    <script>
      const name = sessionStorage.getItem('visitorName') || 'there';
      document.getElementById('message').textContent = `Welcome, ${name}.`;
      function goHome() { window.location.href = 'index.html'; }
      setTimeout(goHome, 3000);
    </script>
  </body>
</html>
