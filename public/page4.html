<!DOCTYPE html>
<html>
  <head>
    <title>Welcome — Versa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
      @font-face { font-family: 'Brother1816'; src: url('brother1816-medium.otf') format('opentype'); }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #ffffff;
        display: flex; flex-direction: column;
        align-items: center; justify-content: space-between;
        height: 100vh; overflow: hidden;
        font-family: 'Brother1816', Arial, sans-serif;
        padding: 36px 24px 32px;
      }

      #logoWrap { width: 100px; }
      #logoWrap img { width: 100%; display: block; }
      #p45TopBar { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; flex-shrink: 0; }
      #topRight { text-align: right; }
      #clock { font-size: 16px; font-weight: bold; line-height: 1.5; color: #1a1a1a; }
      #weatherBlock { margin-top: 4px; }
      #weatherLine { display: flex; align-items: center; justify-content: flex-end; gap: 4px; }
      #weatherIcon { font-size: 16px; }
      #weatherTemp { font-size: 14px; font-weight: bold; color: #444; }
      #weatherSun  { font-size: 11px; color: #888; margin-top: 2px; }


      #message {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        width: 100%; text-align: center;
      }

      #greeting {
        font-size: 8vw; font-weight: 900;
        text-transform: uppercase; color: #1a1a1a;
        line-height: 0.85; letter-spacing: -0.01em; width: 100%;
      }

      #nameText {
        font-size: 7vw; font-weight: 900;
        text-transform: uppercase; color: #1a1a1a;
        line-height: 0.9; letter-spacing: -0.01em;
        width: 100%; word-break: break-word;
      }

      #subText {
        font-size: 3vw; font-weight: bold;
        text-transform: uppercase; color: #ccc;
        letter-spacing: 0.1em; margin-top: 10px;
      }

      button {
        flex-shrink: 0; padding: 16px 44px; font-size: 18px;
        border-radius: 12px; cursor: pointer;
        border: 2px solid #1a1a1a; background: transparent; color: #1a1a1a;
        font-family: inherit; letter-spacing: 0.08em; text-transform: uppercase;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.15s, color 0.15s;
      }
      button:active { background: #1a1a1a; color: white; }

      #timerBar {
        position: fixed; bottom: 0; left: 0;
        height: 4px; background: #1a1a1a; width: 100%;
        transform-origin: left; transition: transform 1s linear;
      }

      /* ── Safe edge padding ── */
      body { padding-left: max(24px, env(safe-area-inset-left));
             padding-right: max(24px, env(safe-area-inset-right)); }

      /* ── Background image ── */
      body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0;
        background-image: url('studio-bw.jpg');
        background-size: cover;
        background-position: center;
        opacity: 0.10;
        pointer-events: none;
      }
      body > * { position: relative; z-index: 1; }

      /* Notice banner */
      #noticeBanner {
        width: 100%; background: #f5f0e8; color: #5a4a2a;
        border-radius: 12px; padding: 12px 18px;
        font-size: 15px; line-height: 1.5;
        display: none; flex-shrink: 0; margin-top: 16px;
        border-left: 4px solid #c9a84c;
      }
      #noticeBanner .notice-label {
        font-size: 11px; font-weight: bold; letter-spacing: 0.08em;
        text-transform: uppercase; color: #c9a84c; margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div id="p45TopBar">
      <div id="logoWrap"><img src="Versa Logo.png" alt="Versa"></div>
      <div id="topRight">
        <div id="clock"></div>
        <div id="weatherBlock">
          <div id="weatherLine"><span id="weatherIcon"></span><span id="weatherTemp"></span></div>
          <div id="weatherSun"></div>
        </div>
      </div>
    </div>
    <div id="message">
      <div id="greeting"></div>
      <div id="nameText"></div>
      <div id="subText"></div>
    </div>
    <div id="noticeBanner"><div class="notice-label">Today's notice</div><div id="noticeText"></div></div>
    <button onclick="goHome()">Close</button>
    <div id="timerBar"></div>

    <script>
      // ── Greeting lists ──
      const hour = new Date().getHours();
      const mins = new Date().getHours() * 60 + new Date().getMinutes();

      const generalGreetings = [
        'Howdy', 'Welcome', 'Nice to see you',
        'Good to see you', 'Bonjour', 'Hello', 'Hey'
      ];

      const timeGreetings = [];
      if (mins < 660)       timeGreetings.push('Good Morning');   // before 11am
      if (mins >= 720 && mins < 1050) timeGreetings.push('Good Afternoon'); // noon–5:30pm
      if (mins >= 1050)     timeGreetings.push('Good Evening');   // after 5:30pm

      const newVisitorGreetings = [
        'Welcome aboard', 'A warm welcome', 'Delighted to see you',
        'Pleased to meet you', 'Thanks for joining us', "We're glad you're here"
      ];

      const bottomMessages = [
        'Nice to see you', 'Good to see you',
        'Great to see you', 'Welcome to Versa'
      ];

      const isNew = sessionStorage.getItem('isNewVisitor') === 'true';
      const name  = sessionStorage.getItem('visitorName') || 'there';

      // Pick greeting: time-specific 40% of the time if available, else general
      let pool = [...generalGreetings];
      if (timeGreetings.length > 0) pool = [...pool, ...timeGreetings, ...timeGreetings]; // weight time ones
      if (isNew) pool = [...newVisitorGreetings];

      const greeting = pool[Math.floor(Math.random() * pool.length)];
      const subText  = bottomMessages[Math.floor(Math.random() * bottomMessages.length)];

      document.getElementById('greeting').textContent = greeting + ',';
      document.getElementById('nameText').textContent  = name + '.';
      document.getElementById('subText').textContent   = subText;

      // Scale down for long names
      const nameEl = document.getElementById('nameText');
      if (name.length > 10) nameEl.style.fontSize = '6vw';
      if (name.length > 16) nameEl.style.fontSize = '5vw';

      // ── Timer (3s auto close + red bar) ──
      let timeLeft = 3;
      const bar = document.getElementById('timerBar');
      bar.style.transform = 'scaleX(1)';
      const t = setInterval(() => {
        timeLeft--;
        bar.style.transform = `scaleX(${timeLeft / 3})`;
        if (timeLeft <= 0) { clearInterval(t); goHome(); }
      }, 1000);


      async function loadWeather() {
        try {
          const url = 'https://api.open-meteo.com/v1/forecast?latitude=51.5074&longitude=-0.1278&current=temperature_2m,weathercode&daily=sunrise,sunset&timezone=Europe%2FLondon&forecast_days=1';
          const res = await fetch(url);
          const data = await res.json();
          const temp = Math.round(data.current.temperature_2m);
          const code = data.current.weathercode;
          const sunrise = data.daily.sunrise[0].split('T')[1];
          const sunset  = data.daily.sunset[0].split('T')[1];
          const icMap = {0:'sunny',1:'partly',2:'partly',3:'cloudy',45:'foggy',48:'foggy',51:'drizzle',61:'rainy',71:'snowy',80:'rainy',95:'stormy'};
          const emojiMap = {'sunny':'&#x2600;','partly':'&#x26C5;','cloudy':'&#x2601;','foggy':'&#x1F32B;','drizzle':'&#x1F326;','rainy':'&#x1F327;','snowy':'&#x1F328;','stormy':'&#x26C8;'};
          const key = Object.keys(icMap).reverse().find(k => code >= parseInt(k)) || '0';
          const emoji = emojiMap[icMap[key]] || '&#x1F321;';
          const el = document.getElementById('weatherTemp');
          const ic = document.getElementById('weatherIcon');
          const su = document.getElementById('weatherSun');
          if (el) el.textContent = temp + String.fromCharCode(176) + 'C';
          if (ic) ic.innerHTML = emoji;
          if (su) su.innerHTML = 'Rise ' + sunrise + ' &nbsp; Set ' + sunset;
        } catch (e) {}
      }
      loadWeather();
      setInterval(loadWeather, 10 * 60 * 1000);

      function getDaySuffix(d) {
        if (d >= 11 && d <= 13) return 'th';
        switch (d % 10) { case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th'; }
      }
      function updateClock() {
        const now = new Date();
        const dayName = now.toLocaleString('en-GB', { weekday: 'long' });
        const day = now.getDate();
        const month = now.toLocaleString('en-GB', { month: 'long' });
        const time = now.toLocaleString('en-GB', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
        const el = document.getElementById('clock');
        if (el) el.innerHTML = dayName + ' ' + day + getDaySuffix(day) + ' ' + month + '<br>' + time;
      }
      setInterval(updateClock, 1000); updateClock();

      // Load notice
      fetch('/api/notice').then(r => r.json()).then(data => {
        if (data && data.text) {
          document.getElementById('noticeText').textContent = data.text;
          document.getElementById('noticeBanner').style.display = 'block';
        }
      }).catch(() => {});

      function goHome() { clearInterval(t); window.location.href = 'index.html'; }
    </script>
  </body>
</html>
