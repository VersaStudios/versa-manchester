<!DOCTYPE html>
<html>
  <head>
    <title>Sign In — Versa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
      @font-face { font-family: 'Brother1816'; src: url('brother1816-medium.otf') format('opentype'); }
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #ffffff;
        display: flex; flex-direction: column; align-items: center;
        min-height: 100vh;
        font-family: 'Brother1816', Arial, sans-serif;
      }

      #topBar {
        width: 100%; display: flex;
        justify-content: space-between; align-items: flex-start;
        padding: 28px 40px 0;
      }

      #logo { width: 130px; cursor: pointer; }

      #clock {
        text-align: right; font-size: 18px;
        font-weight: bold; line-height: 1.5; color: #1a1a1a;
      }

      #box {
        background: #f7f7f7;
        border: 1.5px solid #e0e0e0;
        padding: 36px 40px 40px;
        border-radius: 24px;
        width: 420px;
        margin-top: 32px;
        text-align: center;
      }

      #box h2 {
        font-size: 30px; margin-bottom: 22px;
        letter-spacing: 0.06em; text-transform: uppercase;
      }

      #searchWrap { position: relative; }

      input[type="text"] {
        width: 100%; padding: 18px 20px;
        border-radius: 14px; border: 1.5px solid #d0d0d0;
        font-size: 22px; font-family: inherit;
        background: white; color: #1a1a1a;
        outline: none; transition: border-color 0.2s;
        /* Triggers native keyboard on iPad */
        -webkit-user-select: text;
      }
      input[type="text"]:focus { border-color: #1a1a1a; }

      #results {
        display: none; position: absolute; top: 100%; left: 0; right: 0;
        background: white; border: 1.5px solid #d0d0d0; border-top: none;
        border-radius: 0 0 14px 14px; z-index: 10;
        max-height: 300px; overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        text-align: left;
      }

      .result-item {
        padding: 16px 20px; cursor: pointer;
        border-bottom: 1px solid #f0f0f0; transition: background 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .result-item:last-child { border-bottom: none; }
      .result-item:active { background: #f0f0f0; }
      .result-name { font-size: 18px; font-weight: bold; color: #1a1a1a; }
      .result-meta { font-size: 14px; color: #888; margin-top: 3px; }

      .result-new {
        padding: 16px 20px; cursor: pointer;
        color: #1a1a1a; font-size: 16px; font-weight: bold;
        border-top: 1px solid #eee; background: #fafafa;
        -webkit-tap-highlight-color: transparent;
      }
      .result-new:active { background: #f0f0f0; }

      #newPersonForm {
        display: none; margin-top: 22px; text-align: left;
        border-top: 1.5px solid #e8e8e8; padding-top: 22px;
      }
      #newPersonForm label {
        font-size: 12px; color: #666; display: block;
        margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase;
      }
      #newPersonForm input,
      #newPersonForm select {
        width: 100%; padding: 14px 16px;
        border-radius: 12px; border: 1.5px solid #d0d0d0;
        font-size: 18px; font-family: inherit; margin-bottom: 14px;
        background: white; outline: none;
        -webkit-user-select: text;
      }
      #newPersonForm input:focus,
      #newPersonForm select:focus { border-color: #1a1a1a; }

      .btn {
        width: 100%; padding: 20px; font-size: 22px;
        border-radius: 14px; cursor: pointer; border: none;
        font-family: 'Brother1816', Arial, sans-serif;
        letter-spacing: 0.04em; margin-top: 4px;
        -webkit-tap-highlight-color: transparent;
        transition: opacity 0.15s;
      }
      .btn:active { opacity: 0.8; }
      .btn-black { background: #1a1a1a; color: white; }
      .btn-outline {
        background: white; color: #1a1a1a;
        border: 1.5px solid #d0d0d0; margin-top: 10px;
      }

      #status { margin-top: 14px; font-size: 15px; color: #c00; min-height: 1.2em; }
    </style>
  </head>
  <body>

    <div id="topBar">
      <img id="logo" src="Versa Logo.png" alt="Versa">
      <div id="clock"></div>
    </div>

    <div id="box">
      <h2>Sign In</h2>

      <div id="searchWrap">
        <input id="searchInput" type="text" placeholder="Type your name…"
               autocomplete="off" autocorrect="off" autocapitalize="words"
               inputmode="text">
        <div id="results"></div>
      </div>

      <div id="newPersonForm">
        <div id="jobTitleWrap">
          <label>Job Title</label>
          <input id="newJobTitle" type="text" placeholder="e.g. Studio Engineer"
                 autocomplete="off" autocorrect="off" inputmode="text">
        </div>
        <label>Project</label>
        <select id="newProject"></select>
        <button class="btn btn-black" onclick="registerAndSignIn()">Register &amp; Sign In</button>
        <button class="btn btn-outline" onclick="cancelNew()">Cancel</button>
      </div>

      <div id="status"></div>
    </div>

    <script>
      let allPeople = [];
      let allProjects = [];
      let selectedPerson = null;
      let newPersonName = '';

      async function loadPeople() {
        try {
          const res = await fetch('/api/people');
          const data = await res.json();
          allProjects = data.projects;
          allPeople = [];
          data.projects.forEach(proj => {
            if (!proj.visitorProject) {
              proj.people.forEach(p => allPeople.push({ ...p, projectName: proj.name, projectId: proj.id }));
            }
          });
          populateProjectDropdown();
        } catch (e) {
          document.getElementById('status').textContent = 'Could not load people list.';
        }
      }

      function populateProjectDropdown() {
        const sel = document.getElementById('newProject');
        sel.innerHTML = '';
        allProjects.forEach(proj => {
          const opt = document.createElement('option');
          opt.value = proj.id;
          opt.textContent = proj.name;
          sel.appendChild(opt);
        });
        updateJobTitleVisibility();
      }

      function updateJobTitleVisibility() {
        const projectId = document.getElementById('newProject').value;
        const project = allProjects.find(p => p.id === projectId);
        document.getElementById('jobTitleWrap').style.display =
          project && project.visitorProject ? 'none' : 'block';
      }

      document.getElementById('newProject').addEventListener('change', updateJobTitleVisibility);

      document.getElementById('searchInput').addEventListener('input', function () {
        const query = this.value.trim().toLowerCase();
        const resultsBox = document.getElementById('results');
        document.getElementById('newPersonForm').style.display = 'none';
        selectedPerson = null;

        if (query.length < 1) { resultsBox.style.display = 'none'; return; }

        const matches = allPeople.filter(p => p.name.toLowerCase().includes(query));
        resultsBox.innerHTML = '';

        matches.forEach(p => {
          const div = document.createElement('div');
          div.className = 'result-item';
          div.innerHTML = `<div class="result-name">${escHtml(p.name)}</div>
                           <div class="result-meta">${escHtml(p.jobTitle)} · ${escHtml(p.projectName)}</div>`;
          div.onclick = () => selectPerson(p);
          resultsBox.appendChild(div);
        });

        const addNew = document.createElement('div');
        addNew.className = 'result-new';
        addNew.textContent = `+ Add "${this.value.trim()}" as a new person`;
        addNew.onclick = () => showNewPersonForm(this.value.trim());
        resultsBox.appendChild(addNew);

        resultsBox.style.display = 'block';
      });

      document.addEventListener('click', e => {
        if (!document.getElementById('searchWrap').contains(e.target))
          document.getElementById('results').style.display = 'none';
      });

      function selectPerson(person) {
        selectedPerson = person;
        document.getElementById('searchInput').value = person.name;
        document.getElementById('results').style.display = 'none';
        signIn();
      }

      async function signIn() {
        if (!selectedPerson) return;
        const status = document.getElementById('status');
        try {
          const res = await fetch('/api/signin', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ personId: selectedPerson.id, name: selectedPerson.name, jobTitle: selectedPerson.jobTitle, project: selectedPerson.projectName })
          });
          const data = await res.json();
          if (res.status === 409) { status.textContent = `${selectedPerson.name} is already signed in.`; return; }
          if (!res.ok) { status.textContent = data.error || 'Something went wrong.'; return; }
          sessionStorage.setItem('visitorName', selectedPerson.name);
          window.location.href = 'page4.html';
        } catch (e) { status.textContent = 'Could not reach server.'; }
      }

      function showNewPersonForm(name) {
        newPersonName = name;
        document.getElementById('searchInput').value = name;
        document.getElementById('results').style.display = 'none';
        document.getElementById('newPersonForm').style.display = 'block';
        updateJobTitleVisibility();
        document.getElementById('newJobTitle').focus();
      }

      function cancelNew() {
        document.getElementById('newPersonForm').style.display = 'none';
        document.getElementById('searchInput').value = '';
        document.getElementById('searchInput').focus();
        newPersonName = '';
      }

      async function registerAndSignIn() {
        const jobTitle = document.getElementById('newJobTitle').value.trim();
        const projectId = document.getElementById('newProject').value;
        const status = document.getElementById('status');
        if (!newPersonName) { status.textContent = 'No name entered.'; return; }

        const project = allProjects.find(p => p.id === projectId);
        const isVisitor = project && project.visitorProject;

        try {
          const regRes = await fetch('/api/people', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newPersonName, jobTitle: isVisitor ? '' : jobTitle, projectId })
          });
          const regData = await regRes.json();
          if (regRes.status === 409) { status.textContent = 'That name already exists.'; return; }
          if (!regRes.ok) { status.textContent = regData.error || 'Could not register.'; return; }

          const signinRes = await fetch('/api/signin', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ personId: regData.person.id, name: newPersonName, jobTitle: isVisitor ? '' : jobTitle, project: project ? project.name : '' })
          });
          const signinData = await signinRes.json();
          if (!signinRes.ok) { status.textContent = signinData.error || 'Could not sign in.'; return; }

          sessionStorage.setItem('visitorName', newPersonName);
          window.location.href = 'page4.html';
        } catch (e) { status.textContent = 'Could not reach server.'; }
      }

      function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      document.getElementById('logo').onclick = () => window.location.href = 'index.html';

      function getDaySuffix(d) {
        if (d >= 11 && d <= 13) return 'th';
        switch (d % 10) { case 1: return 'st'; case 2: return 'nd'; case 3: return 'rd'; default: return 'th'; }
      }
      function updateClock() {
        const now = new Date();
        const dayName = now.toLocaleString('en-GB', { weekday: 'long' });
        const day = now.getDate();
        const month = now.toLocaleString('en-GB', { month: 'long' });
        const time = now.toLocaleString('en-GB', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
        document.getElementById('clock').innerHTML = `${dayName} ${day}${getDaySuffix(day)} ${month}<br>${time}`;
      }
      setInterval(updateClock, 1000);
      updateClock();
      loadPeople();
      document.getElementById('searchInput').focus();
    </script>
  </body>
</html>
